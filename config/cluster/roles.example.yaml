# config/cluster/roles.example.yaml
version: 1

role_definitions:
  orchestrator:
    description: "Routes jobs, enforces policies, maintains system state"
  scheduler:
    description: "Creates run plans and enqueues jobs"
  db_primary:
    description: "Primary DB host (sqlite volume v1, postgres later)"
  worker_light:
    description: "Low/medium CPU tasks: research, scoring, reporting"
  worker_heavy:
    description: "Heavier tasks: content generation batches, processing"
  publishing:
    description: "WordPress publishing + sitemap updates (gated)"
  analytics:
    description: "Ingests performance signals and updates ROI models"

role_assignment:
  node_a:
    - orchestrator
    - scheduler
    - db_primary
    - worker_light
  node_b:
    - worker_heavy
    - publishing
    - analytics

notes:
  - "Roles are configurable; in outages, node_b can run worker_light if needed."
  - "Publishing should remain gated (DRY_RUN default, SAFE_STAGING optional)."
