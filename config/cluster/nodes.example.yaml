# config/cluster/nodes.example.yaml
version: 1

cluster_name: "openclaw-affiliate-cluster"
owners:
  - "DA / Don Anthony"
  - "Corey"
  - "Fern"
  - "David"
  - "Jamie"

nodes:
  - id: "node_a"
    hostname: "oc-core-01"
    description: "Primary control/orchestrator node"
    os: "macos"
    roles:
      - "orchestrator"
      - "scheduler"
      - "db_primary"
      - "worker_light"
    static_ip: "192.168.1.10"   # placeholder
    ssh_user: "openclaw"        # placeholder
    data_mount_path: "/Volumes/OpenClawData"  # adjust to your SSD dock mount
    labels:
      location: "cluster_shelf"
      ups_backed: true

  - id: "node_b"
    hostname: "oc-work-01"
    description: "Primary content + publishing worker node"
    os: "macos"
    roles:
      - "worker_heavy"
      - "publishing"
      - "analytics"
    static_ip: "192.168.1.11"   # placeholder
    ssh_user: "openclaw"        # placeholder
    data_mount_path: "/Volumes/OpenClawData"  # adjust
    labels:
      location: "cluster_shelf"
      ups_backed: true
