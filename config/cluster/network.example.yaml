# config/cluster/network.example.yaml
version: 1

isp: "Spectrum"
dedicated_line_mbps: 1000

router:
  model: "Spectrum Router (placeholder)"
  lan_gateway_ip: "192.168.1.1"
  lan_subnet_cidr: "192.168.1.0/24"
  dns_servers:
    - "1.1.1.1"
    - "8.8.8.8"
  dhcp:
    enabled: true
    range_start: "192.168.1.100"
    range_end: "192.168.1.199"
  reservations:
    # Reserve these in router UI so they never change
    - hostname: "oc-core-01"
      mac_address: "AA:BB:CC:DD:EE:01"  # placeholder
      ip: "192.168.1.10"
    - hostname: "oc-work-01"
      mac_address: "AA:BB:CC:DD:EE:02"  # placeholder
      ip: "192.168.1.11"

switch:
  model: "Netgear 16-port PoE Gigabit"
  uplink_port: 1
  port_map:
    "1": "Router uplink"
    "2": "oc-core-01 (node_a)"
    "3": "oc-work-01 (node_b)"
    # leave remaining ports open for expansion

ups:
  model: "CyberPower CP1500AVRLCD3"
  protected_devices:
    - "router"
    - "switch"
    - "node_a"
    - "node_b"
  usb_shutdown_host: "oc-core-01" # recommended: connect UPS USB to node_a
